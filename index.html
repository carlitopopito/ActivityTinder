<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktivitäten-Matcher</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f0; min-height: 100vh; }
.app { max-width: 420px; margin: 0 auto; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 500; }
.header p { font-size: 13px; color: #666; margin-top: 4px; }

.player-select { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.player-btn { flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; background:white; font-size:14px; cursor:pointer; }
.player-btn.active { background:#EEEDFE; border-color:#534AB7; color:#3C3489; font-weight:500; }

.filter-panel { background:white; border:1px solid #e5e5e5; border-radius:12px; padding:1rem; margin-bottom:1.5rem; }
.filter-panel h3 { font-size:14px; font-weight:500; margin-bottom:12px; }
.filter-row { margin-bottom:10px; }
.filter-row:last-child { margin-bottom:0; }
.filter-row label { font-size:12px; color:#666; display:block; margin-bottom:5px; }
.chip-group { display:flex; flex-wrap:wrap; gap:6px; }
.chip { padding:5px 11px; border-radius:20px; font-size:12px; border:1px solid #ddd; background:white; cursor:pointer; transition:all 0.12s; }
.chip.active { background:#EEEDFE; border-color:#534AB7; color:#3C3489; font-weight:500; }

.card-stack { position:relative; height:280px; margin-bottom:1.5rem; }
.activity-card { position:absolute; inset:0; background:white; border:1px solid #e5e5e5; border-radius:16px; padding:1.5rem; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; transition:transform 0.35s ease, opacity 0.35s ease; }
.activity-card .emoji { font-size:44px; margin-bottom:0.75rem; }
.activity-card .name { font-size:20px; font-weight:500; }
.activity-card .tags { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:8px; }
.tag { font-size:11px; padding:2px 8px; border-radius:20px; background:#f0f0ea; color:#555; }
.activity-card .desc { font-size:13px; color:#666; margin-top:8px; }
.card-shadow { position:absolute; inset:8px -4px -6px; background:#e8e8e0; border-radius:16px; z-index:-1; }
.slide-out-left  { transform:translateX(-120%) rotate(-12deg); opacity:0; }
.slide-out-right { transform:translateX( 120%) rotate( 12deg); opacity:0; }

.vote-btns { display:flex; gap:12px; margin-bottom:1.5rem; }
.vote-btn { flex:1; padding:14px; border-radius:8px; border:1px solid #ddd; background:white; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.15s; }
.vote-btn:active { transform:scale(0.97); }
.vote-btn.nein:hover { background:#FAECE7; border-color:#D85A30; color:#993C1D; }
.vote-btn.ja:hover   { background:#E1F5EE; border-color:#1D9E75; color:#0F6E56; }

.status-bar { background:#f5f5f0; border-radius:8px; padding:10px 14px; font-size:13px; color:#666; display:flex; gap:12px; flex-wrap:wrap; margin-bottom:1rem; }
.matches-list { margin-top:0.5rem; }
.match-item { background:#E1F5EE; border:1px solid #1D9E75; border-radius:8px; padding:10px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.match-item .mi-emoji { font-size:22px; }
.match-item .mi-name { font-size:14px; font-weight:500; color:#085041; }
.match-item .mi-tag { font-size:11px; color:#0F6E56; background:#9FE1CB; padding:2px 7px; border-radius:20px; margin-left:auto; white-space:nowrap; }
.done-msg { text-align:center; padding:2rem 1rem; color:#666; font-size:14px; }
.done-msg .big { font-size:40px; margin-bottom:0.5rem; }
.progress { font-size:12px; color:#888; text-align:right; margin-bottom:8px; }
.empty-msg { text-align:center; padding:2rem 1rem; color:#888; font-size:14px; background:white; border-radius:12px; margin-bottom:1rem; }
.reset-btn { width:100%; margin-top:1rem; padding:10px; border-radius:8px; border:1px solid #ddd; background:transparent; color:#888; font-size:13px; cursor:pointer; }
.reset-btn:hover { background:#f5f5f0; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎯 Was machen wir?</h1>
    <p>Stimmt ab — bei Match wird's euch gemeldet</p>
  </div>

  <div class="player-select">
    <button class="player-btn active" id="btnA" onclick="selectPlayer('A')">👤 Person A</button>
    <button class="player-btn"        id="btnB" onclick="selectPlayer('B')">👤 Person B</button>
  </div>

  <div class="filter-panel">
    <h3>🔍 Filter <span id="filterCount" style="font-weight:400;color:#888;font-size:12px;"></span></h3>
    <div class="filter-row"><label>Kategorie</label><div class="chip-group" id="filterKategorie"></div></div>
    <div class="filter-row"><label>Kosten (max)</label><div class="chip-group" id="filterKosten"></div></div>
    <div class="filter-row"><label>Wetter</label><div class="chip-group" id="filterWetter"></div></div>
    <div class="filter-row"><label>Tag</label><div class="chip-group" id="filterTag"></div></div>
    <div class="filter-row"><label>Tageszeit</label><div class="chip-group" id="filterZeit"></div></div>
  </div>

  <div id="mainContent"></div>
</div>

<script>
// ============================================================
//  AKTIVITÄTEN
//
//  Felder mit Array-Logik (["egal"] = passt immer):
//    wetter:    ["sonne","bewoelkt","regen","kalt"]  oder ["egal"]
//    tage:      ["mo","di","mi","do","fr","sa","so"] oder ["egal"]
//    zeiten:    ["morgens","mittags","abends"]        oder ["egal"]
//
//  Felder mit Skala-Logik:
//    kosten:    "kostenlos" | "guenstig" | "mittel" | "teuer"
//               Filter wählt MAX — alles darunter wird auch angezeigt
//
//  Alles weggelassen = Default "egal" / "kostenlos..teuer"
// ============================================================
const COST_RANK = { "kostenlos":0, "guenstig":1, "mittel":2, "teuer":3 };

function defaults(a) {
  return {
    wetter: ["egal"],
    tage:   ["egal"],
    zeiten: ["egal"],
    kosten: "teuer",   // default = erscheint bei jedem Kosten-Filter
    ...a
  };
}

const ACTIVITIES = [
  // --- Zuhause ---
  defaults({ name:"Kochen",          emoji:"🍳", desc:"Gemeinsam ein neues Rezept ausprobieren", kategorie:"Zuhause", kosten:"guenstig" }),
  defaults({ name:"Brettspiel-Abend",emoji:"🎲", desc:"Strategiespiele oder Partyspiele",        kategorie:"Zuhause", kosten:"kostenlos" }),
  defaults({ name:"Film-Abend",      emoji:"🎬", desc:"Auf dem Sofa einen Film schauen",          kategorie:"Zuhause", kosten:"kostenlos" }),
  defaults({ name:"Backen",          emoji:"🍰", desc:"Kuchen oder Kekse backen",                 kategorie:"Zuhause", kosten:"guenstig" }),
  // --- Essen ---
  defaults({ name:"Restaurant",      emoji:"🍽️", desc:"Essen gehen und was Neues probieren",      kategorie:"Essen",   kosten:"mittel" }),
  defaults({ name:"Streetfood",      emoji:"🌮", desc:"Markt oder Streetfood-Festival",           kategorie:"Essen",   kosten:"guenstig", wetter:["sonne","bewoelkt"] }),
  defaults({ name:"Frühstücken",     emoji:"☕", desc:"Gemütlich irgendwo brunchen",              kategorie:"Essen",   kosten:"guenstig", zeiten:["morgens","mittags"] }),
  // --- Trinken ---
  defaults({ name:"Bar-Abend",       emoji:"🍸", desc:"Cocktails oder Bier in einer netten Bar",  kategorie:"Trinken", kosten:"mittel",   zeiten:["abends"] }),
  defaults({ name:"Weinprobe",       emoji:"🍷", desc:"Weine kennenlernen und genießen",          kategorie:"Trinken", kosten:"mittel" }),
  defaults({ name:"Kaffee & Spaziergang",emoji:"🥐",desc:"Kaffee to go und die Stadt erkunden",  kategorie:"Trinken", kosten:"guenstig", wetter:["sonne","bewoelkt"] }),
  // --- Natur ---
  defaults({ name:"Wandern",         emoji:"🥾", desc:"Raus in die Natur, frische Luft",          kategorie:"Natur",   kosten:"kostenlos", wetter:["sonne","bewoelkt","kalt"] }),
  defaults({ name:"Picknick",        emoji:"🧺", desc:"Mit Essen raus in den Park",               kategorie:"Natur",   kosten:"guenstig",  wetter:["sonne","bewoelkt"] }),
  defaults({ name:"Fahrrad fahren",  emoji:"🚴", desc:"Eine Radtour in der Gegend",               kategorie:"Natur",   kosten:"kostenlos", wetter:["sonne","bewoelkt"] }),
  defaults({ name:"Schwimmen",       emoji:"🏊", desc:"Freibad oder See",                         kategorie:"Natur",   kosten:"guenstig",  wetter:["sonne"] }),
  // --- Stadt ---
  defaults({ name:"Stadtbummel",     emoji:"🛍️", desc:"Schaufenster, Gassen, Plätze entdecken",  kategorie:"Stadt",   kosten:"kostenlos", wetter:["sonne","bewoelkt"] }),
  defaults({ name:"Flohmarkt",       emoji:"🪙", desc:"Schöne Funde entdecken",                  kategorie:"Stadt",   kosten:"guenstig",  wetter:["sonne","bewoelkt"], zeiten:["morgens","mittags"], tage:["sa","so"] }),
  defaults({ name:"Escape Room",     emoji:"🔐", desc:"Rätsel lösen als Team",                    kategorie:"Stadt",   kosten:"teuer" }),
  defaults({ name:"Bowlen",          emoji:"🎳", desc:"Strike nach Strike",                       kategorie:"Stadt",   kosten:"guenstig" }),
  defaults({ name:"Karaoke",         emoji:"🎤", desc:"Singen was das Zeug hält",                 kategorie:"Stadt",   kosten:"mittel",    zeiten:["abends"] }),
  // --- Kultur ---
  defaults({ name:"Museum",          emoji:"🏛️", desc:"Kunst oder Geschichte erkunden",           kategorie:"Kultur",  kosten:"guenstig",  tage:["di","mi","do","fr","sa","so"] }),
  defaults({ name:"Konzert",         emoji:"🎸", desc:"Live-Musik genießen",                      kategorie:"Kultur",  kosten:"teuer",     zeiten:["abends"] }),
  defaults({ name:"Theater",         emoji:"🎭", desc:"Schauspiel oder Musical",                  kategorie:"Kultur",  kosten:"teuer",     zeiten:["abends"] }),
  // --- Sport ---
  defaults({ name:"Klettern",        emoji:"🧗", desc:"Bouldern oder Kletterhalle",               kategorie:"Sport",   kosten:"mittel" }),
  defaults({ name:"Yoga",            emoji:"🧘", desc:"Gemeinsam dehnen und entspannen",          kategorie:"Sport",   kosten:"kostenlos", zeiten:["morgens","mittags"] }),
  defaults({ name:"Minigolf",        emoji:"⛳", desc:"Klassisch, aber immer witzig",             kategorie:"Sport",   kosten:"guenstig",  wetter:["sonne","bewoelkt"] }),
];

// ============================================================
//  FILTER-DEFINITIONEN
// ============================================================
const FILTERS = {
  filterKategorie: { label:"Kategorie", opts:["egal","Essen","Trinken","Natur","Stadt","Zuhause","Kultur","Sport"] },
  filterKosten:    { label:"Kosten",    opts:["egal","kostenlos","guenstig","mittel","teuer"] },
  filterWetter:    { label:"Wetter",    opts:["egal","sonne","bewoelkt","regen","kalt"] },
  filterTag:       { label:"Tag",       opts:["egal","mo","di","mi","do","fr","sa","so"] },
  filterZeit:      { label:"Zeit",      opts:["egal","morgens","mittags","abends"] },
};

const FILTER_LABELS = {
  egal:"egal", sonne:"☀️ Sonne", bewoelkt:"⛅ Bewölkt", regen:"🌧 Regen", kalt:"🥶 Kalt",
  kostenlos:"kostenlos", guenstig:"günstig", mittel:"mittel", teuer:"teuer",
  mo:"Mo", di:"Di", mi:"Mi", do:"Do", fr:"Fr", sa:"Sa", so:"So",
  morgens:"morgens", mittags:"mittags", abends:"abends",
};

// ============================================================
//  STATE
// ============================================================
let state = {
  player: 'A',
  votes: { A:{}, B:{} },
  currentIndex: { A:0, B:0 },
  filters: { filterKategorie:"egal", filterKosten:"egal", filterWetter:"egal", filterTag:"egal", filterZeit:"egal" },
  filteredList: [],
};

// ============================================================
//  FILTER-LOGIK
// ============================================================
function matchesFilter(act) {
  const f = state.filters;

  // Kategorie — exakt
  if (f.filterKategorie !== "egal" && act.kategorie !== f.filterKategorie) return false;

  // Kosten — kleiner-gleich
  if (f.filterKosten !== "egal") {
    if (COST_RANK[act.kosten] > COST_RANK[f.filterKosten]) return false;
  }

  // Array-Felder: passt wenn Aktivität "egal" hat ODER der Filterwert in der Liste steht
  if (f.filterWetter !== "egal") {
    if (!act.wetter.includes("egal") && !act.wetter.includes(f.filterWetter)) return false;
  }
  if (f.filterTag !== "egal") {
    if (!act.tage.includes("egal") && !act.tage.includes(f.filterTag)) return false;
  }
  if (f.filterZeit !== "egal") {
    if (!act.zeiten.includes("egal") && !act.zeiten.includes(f.filterZeit)) return false;
  }

  return true;
}

function applyFilters() {
  state.filteredList = ACTIVITIES.filter(matchesFilter);
}

// ============================================================
//  FILTER-CHIPS
// ============================================================
function buildFilterChips() {
  Object.entries(FILTERS).forEach(([id, def]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = def.opts.map(opt => `
      <button class="chip ${state.filters[id] === opt ? 'active' : ''}"
              onclick="setFilter('${id}','${opt}')">
        ${FILTER_LABELS[opt] || opt}
      </button>`).join('');
  });
  const active = Object.values(state.filters).filter(v => v !== "egal").length;
  document.getElementById('filterCount').textContent = active > 0 ? `(${active} aktiv)` : '';
}

function setFilter(id, value) {
  state.filters[id] = value;
  // Votes + Index des aktiven Spielers zurücksetzen wenn Filter sich ändert
  state.votes[state.player] = {};
  state.currentIndex[state.player] = 0;
  applyFilters();
  buildFilterChips();
  render();
}

// ============================================================
//  SPIELER
// ============================================================
function selectPlayer(p) {
  state.player = p;
  document.getElementById('btnA').classList.toggle('active', p === 'A');
  document.getElementById('btnB').classList.toggle('active', p === 'B');
  render();
}

// ============================================================
//  ABSTIMMEN
// ============================================================
function vote(val) {
  const p = state.player;
  const idx = state.currentIndex[p];
  if (idx >= state.filteredList.length) return;
  const act = state.filteredList[idx];
  const card = document.getElementById('currentCard');
  if (card) card.classList.add(val === 'ja' ? 'slide-out-right' : 'slide-out-left');
  setTimeout(() => {
    state.votes[p][act.name] = val;
    state.currentIndex[p]++;
    render();
  }, 320);
}

// ============================================================
//  MATCHES
// ============================================================
function getMatches() {
  return state.filteredList.filter(a =>
    state.votes.A[a.name] === 'ja' && state.votes.B[a.name] === 'ja'
  );
}

// ============================================================
//  TAG-ANZEIGE auf Karte
// ============================================================
function makeTags(act) {
  const tags = [];
  tags.push(act.kategorie);
  const kostLabel = {kostenlos:"kostenlos",guenstig:"günstig",mittel:"mittel",teuer:"teuer"};
  tags.push(kostLabel[act.kosten] || act.kosten);
  if (!act.wetter.includes("egal"))  tags.push(act.wetter.map(w => FILTER_LABELS[w]||w).join(" "));
  if (!act.tage.includes("egal"))    tags.push(act.tage.map(t => FILTER_LABELS[t]||t).join(" "));
  if (!act.zeiten.includes("egal"))  tags.push(act.zeiten.map(z => FILTER_LABELS[z]||z).join(" "));
  return tags.map(t => `<span class="tag">${t}</span>`).join('');
}

// ============================================================
//  RENDER
// ============================================================
function render() {
  const p       = state.player;
  const idx     = state.currentIndex[p];
  const list    = state.filteredList;
  const done    = idx >= list.length;
  const matches = getMatches();
  const jaA     = Object.values(state.votes.A).filter(v => v === 'ja').length;
  const jaB     = Object.values(state.votes.B).filter(v => v === 'ja').length;

  let html = '';

  if (list.length === 0) {
    html += `<div class="empty-msg">🔍 Keine Aktivitäten für diese Filter-Kombination.</div>`;
  } else if (!done) {
    const act = list[idx];
    html += `<div class="progress">${idx + 1} / ${list.length}</div>
    <div class="card-stack">
      <div class="card-shadow"></div>
      <div class="activity-card" id="currentCard">
        <div class="emoji">${act.emoji}</div>
        <div class="name">${act.name}</div>
        <div class="tags">${makeTags(act)}</div>
        <div class="desc">${act.desc}</div>
      </div>
    </div>
    <div class="vote-btns">
      <button class="vote-btn nein" onclick="vote('nein')">✗ Nein</button>
      <button class="vote-btn ja"   onclick="vote('ja')">✓ Ja!</button>
    </div>`;
  } else {
    html += `<div class="done-msg"><div class="big">✅</div>Fertig, ${p === 'A' ? 'Person A' : 'Person B'}!<br>Gib das Handy weiter.</div>`;
  }

  html += `<div class="status-bar">
    <span>👤 A: ${jaA} Ja / ${state.currentIndex.A} bewertet</span>
    <span>👤 B: ${jaB} Ja / ${state.currentIndex.B} bewertet</span>
  </div>`;

  if (matches.length > 0) {
    html += `<div class="matches-list">` +
      matches.map(m => `
        <div class="match-item">
          <span class="mi-emoji">${m.emoji}</span>
          <span class="mi-name">${m.name}</span>
          <span class="mi-tag">🎉 Match!</span>
        </div>`).join('') +
      `</div>`;
  }

  html += `<button class="reset-btn" onclick="resetAll()">↺ Neu starten</button>`;
  document.getElementById('mainContent').innerHTML = html;
}

// ============================================================
//  RESET
// ============================================================
function resetAll() {
  state.votes = { A:{}, B:{} };
  state.currentIndex = { A:0, B:0 };
  applyFilters();
  render();
}

// ============================================================
//  START
// ============================================================
applyFilters();
buildFilterChips();
render();
</script>
</body>
</html>
